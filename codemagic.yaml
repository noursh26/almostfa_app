workflows:
  android-debug:
    name: المصطفى - Debug Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-infos

      - name: Build Debug APK
        script: flutter build apk --debug --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.apk

  android-release:
    name: المصطفى - Release Build
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
      android_signing:
        - keystore_reference
      groups:
        - google_play

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-infos

      - name: Build Release APK
        script: flutter build apk --release --no-tree-shake-icons

      - name: Build App Bundle (AAB)
        script: flutter build appbundle --release --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
