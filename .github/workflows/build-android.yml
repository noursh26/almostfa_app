name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/almostfa-arm32-release.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk artifacts/almostfa-arm64-release.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk artifacts/almostfa-x86_64-release.apk || true
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/almostfa-universal-release.apk
          cp build/app/outputs/bundle/release/app-release.aab artifacts/almostfa-release.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: artifacts/*.aab
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/almostfa-arm64-release.apk
            artifacts/almostfa-universal-release.apk
            artifacts/almostfa-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false
